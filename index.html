<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Music Player UI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app">

        <aside class="sidebar">

            <h2 class="logo">Wave</h2>

            <nav>

                <a href="#">Home</a>
                <a href="#">Discover</a>
                <a href="#">Albums</a>
                <a href="#">Artists</a>
                <a href="#">Favorites</a>

            </nav>

        </aside>


        <main class="player">

            <section class="album">

                <img src="assets/images/album.jpg" alt="Album">

                <h1>Midnight Echoes</h1>

                <p>Aurora Lane</p>

            </section>


            <section class="progress">

                <span>1:24</span>

                <div class="bar">

                    <div class="fill"></div>

                </div>

                <span>3:48</span>

            </section>


            <section class="controls">

                <button>⏮</button>

                <button class="play">▶</button>

                <button>⏭</button>

            </section>


            <section class="volume">

                <span>🔊</span>

                <div class="slider">

                    <div class="level"></div>

                </div>

            </section>

        </main>



        <aside class="playlist">

            <h3>Playlist</h3>

            <ul>

                <li class="active">
                    Midnight Echoes
                </li>

                <li>
                    Ocean Lights
                </li>

                <li>
                    Neon Skies
                </li>

                <li>
                    Lost in Summer
                </li>

                <li>
                    Sunset Dreams
                </li>

            </ul>

        </aside>

    </div>

</body>

</html>
